<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Central Ulfar - Dashboard Operativo</title>
    
    <!-- Librerías Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Gráficos Recharts (Dependencias) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Mapas Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            font-size: 13px;
            scroll-behavior: smooth;
        }

        .leaflet-container { 
            z-index: 10 !important; 
            border-radius: 1rem; 
            border: 1px solid #e2e8f0; 
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        input, select, textarea {
            border: 1px solid #cbd5e1 !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1rem !important;
            font-size: 0.9rem !important;
            background-color: #fff !important;
            color: #1e293b !important;
            outline: none !important;
            width: 100%;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1) !important;
        }

        label {
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
            display: block;
        }

        .nav-tab-active {
            color: #2563eb;
            background-color: #eff6ff;
            border-bottom: 3px solid #2563eb;
        }

        .btn-nav {
            padding: 0 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
            height: 100%;
        }

        /* Escala aumentada para el calendario */
        .calendar-day {
            min-height: 140px; 
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
        }

        .calendar-day:hover { 
            background-color: #f8fafc; 
            border-color: #cbd5e1; 
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
        }

        /* ESTILOS DE LA PÁGINA WEB PÚBLICA */
        .hero-bg-public {
            background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.95)), 
                        url('https://images.unsplash.com/photo-1506015391300-4802dc74de2e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .service-img-container {
            position: relative;
            height: 240px;
            width: 100%;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .service-img-container svg.fallback-icon {
            position: absolute;
            width: 64px;
            height: 64px;
            color: #cbd5e1;
            z-index: 1;
        }

        .service-img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .img-loaded {
            opacity: 1 !important;
        }

        .text-justify-custom { text-align: justify; text-justify: inter-word; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        
        // --- COMPONENTE DE ICONOS SVG ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                MapPin: <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></g>,
                Car: <g><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" /><circle cx="7" cy="17" r="2" /><circle cx="17" cy="17" r="2" /></g>,
                Info: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></g>,
                Clock: <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
                User: <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></g>,
                Check: <polyline points="20 6 9 17 4 12" />,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
                Truck: <g><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16 16 8" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></g>,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                ChevronRight: <polyline points="9 18 15 12 9 6" />,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                Layout: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></g>,
                Calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
                AlertTriangle: <g><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>,
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                ShieldCheck: <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></g>,
                Dollar: <g><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></g>,
                Home: <g><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></g>,
                ArrowRight: <g><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></g>,
                LogOut: <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></g>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" />,
                Target: <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>,
                Phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
                Menu: <g><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></g>,
                Quote: <g><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></g>,
                Facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
                Instagram: <g><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></g>,
                ImageIcon: <g><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- PÁGINA WEB PÚBLICA (LANDING PAGE INTEGRADA) ---
        const LandingPage = ({ onLogin }) => {
            const handleImageLoad = (e) => {
                e.target.classList.add('img-loaded');
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 scroll-smooth">
                    {/* Barra de Navegación Pública */}
                    <nav className="fixed w-full z-50 bg-white/95 backdrop-blur-sm shadow-md border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-20 items-center">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-200">
                                        <Icon name="Truck" size={28} className="text-white" />
                                    </div>
                                    <div>
                                        <span className="text-xl font-black tracking-tighter text-slate-800 uppercase italic">Ulfar Pro</span>
                                        <p className="text-[9px] text-blue-600 font-bold tracking-[0.2em] uppercase">Emergencias 24h</p>
                                    </div>
                                </div>
                                <div className="hidden md:flex space-x-10 font-bold text-sm uppercase tracking-wide items-center">
                                    <a href="#inicio" className="text-slate-600 hover:text-blue-600 transition">Inicio</a>
                                    <a href="#empresa" className="text-slate-600 hover:text-blue-600 transition">Nosotros</a>
                                    <a href="#servicios" className="text-slate-600 hover:text-blue-600 transition">Servicios</a>
                                    <button onClick={onLogin} className="bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase tracking-widest transition-all shadow-xl flex items-center gap-2 transform hover:-translate-y-1">
                                        <Icon name="User" size={14}/> Iniciar Sesión
                                    </button>
                                </div>
                                <div className="md:hidden flex items-center gap-4">
                                    <button onClick={onLogin} className="bg-blue-600 text-white p-2 rounded-lg"><Icon name="User" size={20}/></button>
                                    <button className="p-2 text-slate-600"><Icon name="Menu" size={24}/></button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section id="inicio" className="hero-bg-public h-screen flex items-center pt-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full text-center md:text-left">
                            <div className="max-w-3xl">
                                <div className="inline-block bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest mb-6 shadow-lg shadow-blue-900/50">
                                    Servicio Disponible Ahora
                                </div>
                                <h1 className="text-5xl md:text-7xl font-black text-white leading-[1.1] mb-8 uppercase tracking-tighter italic">
                                    Asistencia de Grúas <br/><span className="text-blue-400 underline decoration-4 underline-offset-8">24 Horas</span>
                                </h1>
                                <p className="text-xl text-slate-300 mb-12 max-w-xl leading-relaxed">
                                    Atendemos tu emergencia con rapidez, seguridad y tecnología avanzada para ofrecerte el precio más transparente de la ciudad.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-5">
                                    <button onClick={onLogin} className="flex items-center justify-center gap-4 bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-2xl shadow-blue-900/40 transform hover:scale-105">
                                        <Icon name="Layout" size={20}/> Ingresar a Plataforma
                                    </button>
                                    <a href="https://wa.me/573100000000" className="flex items-center justify-center gap-4 bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-2xl shadow-emerald-900/40">
                                        <Icon name="MessageSquare" size={20}/> Whatsapp
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Sección: Introducción de Empresa */}
                    <section id="empresa" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                                <div className="order-2 lg:order-1">
                                    <h2 className="text-4xl font-black text-slate-900 mb-8 leading-tight uppercase italic text-blue-600 tracking-tighter">
                                        Servicio de Grúa Profesional las 24 horas del día
                                    </h2>
                                    <div className="space-y-6 text-slate-600 leading-relaxed text-lg text-justify-custom">
                                        <p>
                                            <strong>Ulfar Pro</strong> nace de la necesidad de brindar un óptimo servicio de grúas apoyado en la tecnología. Contamos con modernas grúas de plataforma, cama baja y herramientas de última generación.
                                        </p>
                                        <p className="border-l-4 border-blue-600 pl-6 py-2 bg-slate-50 italic rounded-r-lg">
                                            Disponibles las 24 horas del día para atender tu llamada de auxilio en cualquier momento y lugar.
                                        </p>
                                        <p>
                                            Calculamos nuestras tarifas basados en los 9 factores operativos reales, asegurando que pagues exactamente lo justo por la distancia, complejidad y tipo de vehículo.
                                        </p>
                                    </div>
                                </div>
                                <div className="order-1 lg:order-2 service-img-container rounded-[3rem] h-[500px] shadow-2xl">
                                    <Icon name="ImageIcon" className="fallback-icon" />
                                    <img src="https://images.unsplash.com/photo-1597328290883-50c5787b7c7e?q=80&w=1200&auto=format&fit=crop" 
                                         alt="Grúa en acción" onLoad={handleImageLoad} />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Sección de Servicios Profesionales */}
                    <section id="servicios" className="py-24 bg-slate-50 border-y border-slate-200">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="text-center max-w-3xl mx-auto mb-20">
                                <h2 className="text-4xl font-black text-slate-900 mb-6 uppercase tracking-tighter italic">Servicios Especializados</h2>
                                <div className="h-1.5 w-24 bg-blue-600 mx-auto mb-6 rounded-full"></div>
                                <p className="text-slate-500 text-lg">Soluciones técnicas para todo tipo de emergencias y traslados.</p>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                {/* Servicio 1 */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 hover:-translate-y-2 transition-transform border border-slate-100">
                                    <div className="service-img-container h-56">
                                        <Icon name="AlertTriangle" className="fallback-icon" />
                                        <img src="https://images.unsplash.com/photo-1506015391300-4802dc74de2e?q=80&w=800&auto=format&fit=crop" 
                                             alt="" onLoad={handleImageLoad} />
                                    </div>
                                    <div className="p-8 border-t-4 border-blue-600">
                                        <h4 className="text-blue-600 font-black text-lg mb-4 uppercase leading-tight tracking-tight">Asistencia en Carretera 24H</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed text-justify-custom">Acudiremos rápidamente a cualquier lugar. Modernos vehículos para remolcar sin causar daños a tu carro.</p>
                                    </div>
                                </div>

                                {/* Servicio 2 */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 hover:-translate-y-2 transition-transform border border-slate-100">
                                    <div className="service-img-container h-56">
                                        <Icon name="Car" className="fallback-icon" />
                                        <img src="https://images.unsplash.com/photo-1558981285-6f0c94958bb6?q=80&w=800&auto=format&fit=crop" 
                                             alt="" onLoad={handleImageLoad} />
                                    </div>
                                    <div className="p-8 border-t-4 border-blue-600">
                                        <h4 className="text-blue-600 font-black text-lg mb-4 uppercase leading-tight tracking-tight">Traslados de Vehículos</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed text-justify-custom">Desde motos hasta camionetas grandes. Plataformas seguras para que tu vehículo no ruede ni un kilómetro.</p>
                                    </div>
                                </div>

                                {/* Servicio 3 */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 hover:-translate-y-2 transition-transform border border-slate-100">
                                    <div className="service-img-container h-56">
                                        <Icon name="Target" className="fallback-icon" />
                                        <img src="https://images.unsplash.com/photo-1517404212318-52552b5881f3?q=80&w=800&auto=format&fit=crop" 
                                             alt="" onLoad={handleImageLoad} />
                                    </div>
                                    <div className="p-8 border-t-4 border-blue-600">
                                        <h4 className="text-blue-600 font-black text-lg mb-4 uppercase leading-tight tracking-tight">Rescates Complejos</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed text-justify-custom">Salvamento en barrancos, abismos o terrenos difíciles para cualquier tipo de vehículo pesado o liviano.</p>
                                    </div>
                                </div>

                                {/* Servicio 4 */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 hover:-translate-y-2 transition-transform border border-slate-100">
                                    <div className="service-img-container h-56">
                                        <Icon name="AlertTriangle" className="fallback-icon" />
                                        <img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?q=80&w=800&auto=format&fit=crop" 
                                             alt="" onLoad={handleImageLoad} />
                                    </div>
                                    <div className="p-8 border-t-4 border-blue-600">
                                        <h4 className="text-blue-600 font-black text-lg mb-4 uppercase leading-tight tracking-tight">Maquinaria de Obra</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed text-justify-custom">Excavadoras, retroexcavadoras y tractores. Transporte especializado sin rodaje para evitar desgastes.</p>
                                    </div>
                                </div>

                                {/* Servicio 5 */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 hover:-translate-y-2 transition-transform border border-slate-100">
                                    <div className="service-img-container h-56">
                                        <Icon name="Home" className="fallback-icon" />
                                        <img src="https://images.unsplash.com/photo-1621905235277-3e4040940c8f?q=80&w=800&auto=format&fit=crop" 
                                             alt="" onLoad={handleImageLoad} />
                                    </div>
                                    <div className="p-8 border-t-4 border-blue-600">
                                        <h4 className="text-blue-600 font-black text-lg mb-4 uppercase leading-tight tracking-tight">Equipos Industriales</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed text-justify-custom">Movilización de generadores, bombas y compresores de gran tamaño para todo tipo de industrias.</p>
                                    </div>
                                </div>

                                {/* Servicio 6 */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg shadow-slate-200/50 hover:-translate-y-2 transition-transform border border-slate-100">
                                    <div className="service-img-container h-56">
                                        <Icon name="Truck" className="fallback-icon" />
                                        <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=800&auto=format&fit=crop" 
                                             alt="" onLoad={handleImageLoad} />
                                    </div>
                                    <div className="p-8 border-t-4 border-blue-600">
                                        <h4 className="text-blue-600 font-black text-lg mb-4 uppercase leading-tight tracking-tight">Vehículos Pesados</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed text-justify-custom">Autobuses, tractomulas y camiones. Grúas de gran capacidad para traslados seguros y sin daños.</p>

        const InteractiveMap = ({ lat, lng, onLocationChange, title }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markerInstance = useRef(null);

            useEffect(() => {
                if (!window.L) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                    document.head.appendChild(link);

                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                    script.onload = initMap;
                    document.body.appendChild(script);
                } else {
                    initMap();
                }

                function initMap() {
                    if (!mapInstance.current && mapRef.current) {
                        mapInstance.current = L.map(mapRef.current).setView([lat, lng], 11);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
                        markerInstance.current = L.marker([lat, lng], { draggable: true }).addTo(mapInstance.current);
                        
                        markerInstance.current.on('dragend', async () => {
                            const pos = markerInstance.current.getLatLng();
                            let newAddress = null;

                            try {
                                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}&zoom=18&addressdetails=1`);
                                const data = await response.json();
                                if (data && data.display_name) {
                                    newAddress = data.display_name;
                                }
                            } catch (error) {
                                console.error("Error obteniendo la dirección:", error);
                            }

                            onLocationChange(pos.lat, pos.lng, newAddress);
                        });

                        setTimeout(() => {
                            if (mapInstance.current) {
                                mapInstance.current.invalidateSize();
                            }
                        }, 250);
                    }
                }

                return () => {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                    }
                };
            }, []);

            useEffect(() => {
                if (markerInstance.current && mapInstance.current) {
                    const currentPos = markerInstance.current.getLatLng();
                    if (Math.abs(currentPos.lat - lat) > 0.0001 || Math.abs(currentPos.lng - lng) > 0.0001) {
                        markerInstance.current.setLatLng([lat, lng]);
                        mapInstance.current.panTo([lat, lng]);
                    }
                }
            }, [lat, lng]);

            return (
                <div className="relative w-full h-[280px] overflow-hidden rounded-3xl border-4 border-slate-50 shadow-inner my-4 animate-in z-0">
                    <div ref={mapRef} className="w-full h-full z-0"></div>

                        <Icon name="MapPin" size={12}/> {title}
                    </div>
                </div>
            );
        };

                                                <td className="py-5">
                                                    <p className="font-black text-blue-600 text-lg">{item.precio.toFixed(2)}€</p>
                                                    <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">{item.metodoPago}</p>
                                                </td>
                                                <td className="py-5 text-right px-4">
                                                    <span className={`px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest border ${
                                                        item.status === 'Programado' ? 'bg-blue-50 text-blue-600 border-blue-100' : 
                                                        item.status === 'Completado' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' :
                                                        item.status === 'Cancelado' ? 'bg-red-50 text-red-600 border-red-100' :
                                                        'bg-amber-50 text-amber-600 border-amber-100'
                                                    }`}>
                                                        {item.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const AgendaView = () => {
                const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();
                
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                
                const grid = [];
                for (let i = 0; i < firstDay; i++) grid.push(null);
                for (let i = 1; i <= daysInMonth; i++) grid.push(i);

                const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

                return (
                    <div className="p-10 space-y-8 animate-in text-left h-full overflow-y-auto bg-slate-50">
                        <div className="flex justify-between items-center border-b-2 border-slate-200 pb-6">
                            <div>
                                <h2 className="text-4xl font-black uppercase italic tracking-tighter text-slate-800">Calendario Logístico</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Planificación mensual de flota</p>
                            </div>
                            <span className="text-lg font-black text-blue-600 uppercase italic bg-blue-100 px-8 py-3 rounded-[2rem] shadow-sm">
                                {monthNames[currentMonth]} {currentYear}
                            </span>
                        </div>
                        <div className="bg-white rounded-[3rem] border border-slate-200 shadow-2xl p-10">
                            <div className="grid grid-cols-7 gap-px mb-6 border-b-2 border-slate-100 pb-4">
                                {days.map(d => <div key={d} className="text-center text-[10px] md:text-xs font-black uppercase text-slate-500 tracking-widest">{d}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-4">
                                {grid.map((day, idx) => {
                                    if (!day) return <div key={`empty-${idx}`} className="bg-slate-50/50 rounded-3xl border border-dashed border-slate-200 min-h-[140px]"></div>;
                                    
                                    const dStr = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                                    const tasks = history.filter(h => h.fecha.startsWith(dStr));
                                    const isToday = day === now.getDate();
                                    
                                    return (
                                        <div key={day} className={`min-h-[140px] rounded-3xl p-4 relative flex flex-col gap-2 overflow-y-auto transition-all ${isToday ? 'ring-4 ring-blue-500 bg-blue-50/20' : 'bg-white border border-slate-200 hover:bg-slate-50 hover:shadow-md hover:-translate-y-1'}`}>
                                            <div className="flex justify-between items-center mb-2">
                                                <span className={`text-xl font-black ${isToday ? 'text-blue-600' : 'text-slate-500'}`}>{day}</span>
                                                {tasks.length > 0 && <span className="bg-slate-800 text-white text-[9px] font-black px-2 py-0.5 rounded-full">{tasks.length}</span>}
                                            </div>
                                            <div className="space-y-2">
                                                {tasks.map(t => (
                                                    <div key={t.id} className={`p-2.5 rounded-xl text-[10px] font-black truncate shadow-sm border flex items-center gap-2 ${t.status === 'Pendiente' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-blue-600 text-white border-blue-700'}`}>
                                                        <div className={`w-2 h-2 rounded-full shrink-0 ${t.status === 'Pendiente' ? 'bg-red-500' : 'bg-white'}`}></div>
                                                        {t.cliente}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const ServiceDetailsAudit = () => (
                <div className="mt-10 pt-6 border-t-4 border-slate-100 bg-slate-50/80 rounded-[3rem] p-8 text-left animate-in shadow-inner">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-3 text-slate-500 italic font-black text-xs uppercase tracking-widest"><Icon name="Info" size={18}/> Auditoría de Factores</div>
                        <div className="text-[10px] font-black bg-blue-100 text-blue-600 px-4 py-2 rounded-full uppercase tracking-widest">Cálculo en vivo</div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4 text-sm font-bold text-slate-600">
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><span>1. Recorrido ({currentDistance} km)</span><span className="font-black text-slate-800">{calculation.f1_base.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><span>2. Vacío ({calculation.dVacio} km)</span><span className="font-black text-slate-800">+{calculation.f2_vacio.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><span>3. Peso/Dim (El Mayor)</span><span className="font-black text-slate-800">+{calculation.f3_mayor.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><span>4. Tiempo Operativo</span><span className="font-black text-slate-800">+{calculation.f4_incidencia.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><span>5. Estado Mecánico</span><span className="font-black text-slate-800">+{calculation.f5_mecanica.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><span>6. Prioridad</span><span className="font-black text-slate-800">+{calculation.f6_prioridad.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100 col-span-1 md:col-span-2"><span>7. Día y Hora</span><span className="font-black text-slate-800">+{calculation.f8_horario.toFixed(2)}€</span></div>
                        
                        <div className="flex justify-between items-center col-span-1 md:col-span-2 text-lg font-black text-slate-800 mt-4 pt-4 border-t-2 border-slate-200"><span>SUBTOTAL</span><span>{calculation.subtotal.toFixed(2)}€</span></div>
                        <div className="flex justify-between items-center col-span-1 md:col-span-2 text-3xl font-black text-blue-600 italic bg-blue-100 p-6 rounded-[2rem] border border-blue-200 shadow-md"><span>TOTAL (+ IVA)</span><span>{calculation.total.toFixed(2)}€</span></div>
                    </div>
                </div>
            );

            // CONTROLADOR DE VISTA PRINCIPAL
            if (!isAuthenticated) {
                return <LandingPage onLogin={() => setIsAuthenticated(true)} />;
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 font-sans text-slate-800 animate-in">
                    {showSuccess && (
                        <div className="modal-overlay" onClick={() => setShowSuccess(false)}>
                            <div className="bg-white p-12 rounded-[4rem] shadow-2xl text-center max-w-md w-full mx-4 border-4 border-blue-100 animate-in" onClick={e => e.stopPropagation()}>
                                <div className="bg-emerald-500 text-white w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-xl shadow-emerald-200 rotate-12"><Icon name="ShieldCheck" size={48}/></div>
                                <h2 className="text-3xl font-black text-slate-900 uppercase italic tracking-tighter mb-4">¡Orden Emitida!</h2>
                                <p className="text-base text-slate-500 mb-10 font-medium italic">La asistencia ha sido guardada y sincronizada correctamente.</p>
                                <button onClick={() => {setShowSuccess(false); setStep(1); setActiveTab('dashboard');}} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase tracking-widest text-xs hover:bg-blue-600 transition-all shadow-lg">Ver en Dashboard</button>
                            </div>
                        </div>
                    )}

                    <nav className="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-8 h-full">
                            <div className="flex items-center gap-3 text-blue-600 font-black text-2xl uppercase italic tracking-tighter">
                                <Icon name="Truck" size={28}/>
                                <span>Ulfar Pro</span>
                            </div>
                            <div className="flex h-full border-l-2 border-slate-100 ml-4 pl-4 gap-2">
                                <button onClick={() => setActiveTab('home')} className={`flex items-center gap-2 px-6 h-full font-black text-xs uppercase tracking-widest transition-all ${activeTab === 'home' ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50/50' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50'}`}><Icon name="Home" size={18}/> Inicio</button>
                                <button onClick={() => setActiveTab('new-order')} className={`flex items-center gap-2 px-6 h-full font-black text-xs uppercase tracking-widest transition-all ${activeTab === 'new-order' ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50/50' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50'}`}><Icon name="Truck" size={18}/> Nueva Orden</button>
                                <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-6 h-full font-black text-xs uppercase tracking-widest transition-all ${activeTab === 'dashboard' ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50/50' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50'}`}><Icon name="Layout" size={18}/> Dashboard</button>
                                <button onClick={() => setActiveTab('calendar')} className={`flex items-center gap-2 px-6 h-full font-black text-xs uppercase tracking-widest transition-all ${activeTab === 'calendar' ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50/50' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50'}`}><Icon name="Calendar" size={18}/> Agenda</button>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-4 bg-slate-50 px-4 py-2 rounded-2xl border border-slate-200">
                                <div className="text-right leading-none">
                                    <span className="block text-xs font-black text-slate-800">Administrador</span>
                                    <span className="block text-[9px] text-emerald-600 font-black uppercase mt-1 tracking-widest flex items-center gap-1 justify-end"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> ONLINE</span>
                                </div>
                                <div className="bg-slate-200 p-2 rounded-xl text-slate-500"><Icon name="User" size={20}/></div>
                            </div>
                            <button onClick={() => {setIsAuthenticated(false); setActiveTab('home');}} className="bg-red-50 text-red-600 px-5 py-3 rounded-2xl border border-red-100 hover:bg-red-100 hover:text-red-700 transition-all flex items-center gap-2 font-black text-[10px] uppercase tracking-widest shadow-sm">
                                <Icon name="LogOut" size={16}/> Salir
                            </button>
                        </div>
                    </nav>

                    <div className="flex-1 flex overflow-hidden">
                        {activeTab === 'home' && <HomeView />}
                        
                        {activeTab === 'new-order' && (
                            <>
                                <aside className="w-80 bg-white border-r border-slate-200 p-8 flex flex-col justify-between shadow-2xl animate-in text-left z-10 overflow-y-auto">
                                    <div className="space-y-8">
                                        <h3 className="text-[11px] font-black uppercase text-slate-400 border-b-2 border-slate-100 pb-4 italic tracking-[0.2em]">Monitor Logístico</h3>
                                        <div className="space-y-6">
                                            <div className="flex gap-4 items-center"><div className="bg-blue-50 p-3 rounded-2xl text-blue-600 border border-blue-100"><Icon name="MapPin" size={18}/></div><div><label className="text-[9px] text-slate-400 !mb-0">Origen</label><p className="text-sm font-black leading-tight line-clamp-2 italic text-slate-800">{formData.recogida}</p></div></div>
                                            <div className="flex gap-4 items-center"><div className="bg-emerald-50 p-3 rounded-2xl text-emerald-600 border border-emerald-100"><Icon name="Navigation" size={18}/></div><div><label className="text-[9px] text-slate-400 !mb-0">Destino</label><p className="text-sm font-black leading-tight line-clamp-2 italic text-slate-800">{formData.entrega}</p></div></div>
                                            <div className="flex gap-4 items-center"><div className="bg-amber-50 p-3 rounded-2xl text-amber-600 border border-amber-100"><Icon name="Car" size={18}/></div><div><label className="text-[9px] text-slate-400 !mb-0">Vehículo</label><p className="text-sm font-black leading-tight text-slate-800">{formData.marcaModelo || 'Pendiente'}</p></div></div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 text-white p-6 rounded-[2.5rem] border-4 border-slate-800 text-left shadow-2xl mt-8">
                                        <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-2 italic">Presupuesto Actual</p>
                                        <span className="text-4xl font-black italic tracking-tighter text-blue-400">{calculation.total.toFixed(2)}€</span>
                                    </div>
                                </aside>
                                <main className="flex-1 p-8 overflow-y-auto flex flex-col animate-in relative bg-slate-50">
                                    <div className="flex justify-between items-center mb-10 relative px-8 max-w-4xl mx-auto w-full">
                                        <div className="absolute top-5 left-16 right-16 h-1.5 bg-slate-200 -z-10 rounded-full"></div>
                                        {stepsHeaderItems.map((s) => (
                                            <div key={s.id} className="flex flex-col items-center">
                                                <div className={`w-12 h-12 rounded-[1.25rem] flex items-center justify-center border-4 transition-all duration-300 ${step >= s.id ? 'bg-blue-600 border-white text-white shadow-xl scale-110' : 'bg-slate-100 border-white text-slate-400'}`}>
                                                    {step > s.id ? <Icon name="CheckCircle" size={18}/> : <Icon name={s.icon} size={16}/>}
                                                </div>
                                                <span className={`text-[9px] mt-3 font-black uppercase tracking-widest text-center ${step >= s.id ? 'text-blue-700' : 'text-slate-400'}`}>{s.label}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-white rounded-[3rem] border border-slate-200 flex-1 flex flex-col overflow-hidden max-w-5xl mx-auto w-full shadow-xl">
                                        <div className="p-12 flex-1 overflow-y-auto">
                                            {step === 1 && <div className="space-y-6 animate-in text-left"><h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 italic text-slate-800">1. Ubicación de Recogida</h2><input type="text" className="w-full !p-6 !text-xl font-bold bg-slate-50 rounded-[2rem] border-2 border-slate-100 outline-none focus:border-blue-500 shadow-inner transition-all" value={formData.recogida} onChange={e => setFormData({...formData, recogida: e.target.value})} /><InteractiveMap lat={formData.recogidaCoords.lat} lng={formData.recogidaCoords.lng} title="Punto de Recogida" onLocationChange={(lat,lng, address) => { setFormData(prev => ({...prev, recogidaCoords: {lat,lng}, recogida: address || prev.recogida})); }} /></div>}
                                            {step === 2 && <div className="space-y-6 animate-in text-left"><h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 italic text-slate-800">2. Ubicación de Destino</h2><input type="text" className="w-full !p-6 !text-xl font-bold bg-slate-50 rounded-[2rem] border-2 border-slate-100 outline-none focus:border-blue-500 shadow-inner transition-all" value={formData.entrega} onChange={e => setFormData({...formData, entrega: e.target.value})} /><InteractiveMap lat={formData.entregaCoords.lat} lng={formData.entregaCoords.lng} title="Punto de Destino" onLocationChange={(lat,lng, address) => { setFormData(prev => ({...prev, entregaCoords: {lat,lng}, entrega: address || prev.entrega})); }} /></div>}
                                            
                                            {step === 3 && (
                                                <div className="space-y-6 animate-in text-left">
                                                    <h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 italic text-slate-800">3. Ficha Técnica Vehículo</h2>
                                                    <div className="grid grid-cols-2 gap-8">
                                                        <div><label className="text-xs text-slate-500">Matrícula</label><input type="text" className="w-full font-black uppercase !text-2xl !p-5 bg-blue-50 border-2 border-blue-200 rounded-[2rem] outline-none focus:border-blue-600 shadow-sm" placeholder="EJ: 1234 ABC" value={formData.matricula} onChange={e => setFormData({...formData, matricula: e.target.value.toUpperCase()})} /></div>
                                                        <div className="relative"><label className="text-xs text-slate-500">Modelo / Búsqueda Automática</label><input type="text" className="w-full font-bold !text-lg !p-5 bg-slate-50 border-2 border-slate-200 rounded-[2rem] outline-none focus:border-blue-500 shadow-sm" placeholder="Buscar Audi, VW..." value={searchTerm} onChange={e => {setSearchTerm(e.target.value); setShowVehResults(true);}} onFocus={() => setShowVehResults(true)} />{showVehResults && searchTerm.length > 2 && <div className="absolute top-full left-0 w-full mt-2 bg-white border border-slate-200 rounded-[2rem] shadow-2xl z-50 p-3 max-h-60 overflow-y-auto">{MOCK_VEHICLES.filter(v => v.marca.toLowerCase().includes(searchTerm.toLowerCase())).map(v => (<button key={v.id} onClick={() => selectVehicle(v)} className="w-full text-left p-4 hover:bg-blue-50 rounded-2xl text-sm font-black flex gap-3 items-center italic transition-colors text-slate-700"><div className="bg-slate-100 p-2 rounded-xl"><Icon name="Car" size={16}/></div> {v.marca} {v.modelo}</button>))}</div>}</div>
                                                    </div>
                                                    <div className="grid grid-cols-4 gap-5 bg-slate-50 p-8 rounded-[3rem] border border-slate-200 mt-6 shadow-inner">
                                                        {['tipo', 'categoria', 'largo', 'peso', 'l_l3', 'gama', 'voladizo', 'cilindraje'].map(k => (
                                                            <div key={k}><label className="text-[10px] text-slate-400">{k}</label><input type="text" className="w-full !p-3 !text-sm font-black border-2 border-white bg-white rounded-xl shadow-sm outline-none focus:border-blue-400 text-slate-700" value={formData[k] || ""} onChange={e => setFormData({...formData, [k]: e.target.value})} /></div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            {step === 4 && <div className="space-y-6 animate-in text-left font-bold italic"><h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 italic text-slate-800">4. Análisis Técnico Operativo</h2><div className="grid grid-cols-2 gap-8"><div><label className="text-blue-600 text-xs font-black mb-2">Distancia en Vacío (km reales)</label><input type="number" placeholder="Ej: 18" className="w-full font-black !text-2xl !p-6 border-2 border-blue-200 bg-blue-50 rounded-[2rem] outline-none focus:border-blue-500 text-blue-900" value={formData.distanciaVacio} onChange={e => setFormData({...formData, distanciaVacio: e.target.value})} /></div><div><label className="text-xs text-slate-500 mb-2">Tiempo de Incidencia</label><select className="w-full font-black !p-6 !text-sm border-2 border-slate-200 bg-slate-50 rounded-[2rem] outline-none focus:border-blue-500 text-slate-800" value={formData.tiempoIncidencia} onChange={e => setFormData({...formData, tiempoIncidencia: e.target.value})}><option value="0">Carga Directa &lt; 20 min</option><option value="100">Maniobra Media 30-60m (+100€)</option><option value="200">Maniobra Compleja 60-120m (+200€)</option><option value="300">Operación Prolongada &gt; 120m (+300€)</option></select></div><div><label className="text-xs text-slate-500 mb-2">Estado Mecánico</label><select className="w-full font-black !p-6 !text-sm border-2 border-slate-200 bg-slate-50 rounded-[2rem] outline-none focus:border-blue-500 text-slate-800" value={formData.estadoVehiculo} onChange={e => setFormData({...formData, estadoVehiculo: e.target.value})}><option value="0">Mecánico (Rodante)</option><option value="50">Dirección bloqueada (+50€)</option><option value="100">2 Ruedas bloqueadas (+100€)</option><option value="200">Totalmente inmovilizado (+200€)</option></select></div><div><label className="text-xs text-slate-500 mb-2">Zona Especial / Difícil</label><select className="w-full font-black !p-6 !text-sm border-2 border-slate-200 bg-slate-50 rounded-[2rem] outline-none focus:border-blue-500 text-slate-800" value={formData.zonaDificil} onChange={e => setFormData({...formData, zonaDificil: e.target.value})}><option value="NO">Libre de obstáculos</option><option value="SI">Zona Restringida / Túnel (+50€)</option></select></div></div></div>}
                                            {step === 5 && (
                                                <div className="space-y-8 animate-in text-center">
                                                    <h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 italic text-slate-800">5. Prioridad y Horario</h2>
                                                    <div className="text-left mb-8 px-6"><label className="text-blue-600 text-xs font-black mb-2">Día y Hora del Servicio</label><select className="w-full font-black !p-6 !text-lg border-2 border-blue-200 bg-blue-50 rounded-[2rem] outline-none focus:border-blue-500 text-blue-900" value={formData.horarioEspecial} onChange={e => setFormData({...formData, horarioEspecial: e.target.value})}><option value="0">Laboral (08:00 - 18:00h)</option><option value="30">Nocturno (18:00 - 22:00h) [+30€]</option><option value="150">Nocturno Profundo (22:00 - 08:00h) [+150€]</option><option value="150.1">Domingo / Festivo [+150€]</option><option value="210">Nocturno Profundo + Festivo [+210€]</option></select></div>
                                                    <div className="grid grid-cols-3 gap-8 px-6">{[ {id:"50",l:"URGENTE",c:"text-red-600",i:"AlertTriangle"}, {id:"0",l:"PROGRAMADO",c:"text-blue-600",i:"Clock"}, {id:"150",l:"TALLER MÓVIL",c:"text-orange-600",i:"Zap"} ].map((s) => (<button key={s.id} onClick={() => setFormData({...formData, prioridad: s.id})} className={`p-10 border-4 rounded-[3rem] transition-all duration-300 flex flex-col items-center gap-4 ${formData.prioridad === s.id ? 'border-blue-600 bg-white shadow-2xl scale-105' : 'bg-slate-50 border-slate-100 hover:border-slate-300'}`}><div className={`${s.c}`}><Icon name={s.i} size={48}/></div><h3 className={`text-base font-black uppercase tracking-widest text-slate-800`}>{s.l}</h3></button>))}</div>
                                                </div>
                                            )}
                                            {step === 6 && <div className="space-y-6 animate-in text-left"><h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 text-center italic text-slate-800">6. Información del Cliente</h2><div className="grid grid-cols-2 gap-8 px-10 text-left"><div><label className="text-xs text-slate-500 mb-2">Nombre Completo del Titular</label><input type="text" className="w-full !p-6 bg-slate-50 border-2 border-slate-200 rounded-[2rem] outline-none focus:border-blue-500 font-bold" placeholder="Ej: Roberto Ulfar" value={formData.nombreCliente} onChange={e => setFormData({...formData, nombreCliente: e.target.value})} /></div><div><label className="text-xs text-slate-500 mb-2">Estatus Presencia</label><select className="w-full !p-6 font-black bg-slate-50 border-2 border-slate-200 rounded-[2rem] outline-none focus:border-blue-500 text-slate-700" value={formData.presenciaCliente} onChange={e => setFormData({...formData, presenciaCliente: e.target.value})}><option>Presente</option><option>Ausente / Taller</option></select></div><div><label className="text-xs text-slate-500 mb-2">Fecha Inicio Operación</label><input type="datetime-local" className="w-full !p-6 text-sm font-black bg-slate-50 border-2 border-slate-200 rounded-[2rem] outline-none focus:border-blue-500 text-slate-700" value={formData.fechaServicio} onChange={e => setFormData({...formData, fechaServicio: e.target.value})} /></div><div className="col-span-full"><label className="text-blue-600 font-black italic text-sm mb-2">Número de Celular</label><div className="flex gap-4"><select className="font-black !p-6 !text-lg border-2 border-blue-200 w-1/3 bg-blue-50 rounded-[2rem] outline-none text-blue-900" value={formData.indicativoPais} onChange={e => setFormData({...formData, indicativoPais: e.target.value})}>{COUNTRY_CODES.map(c => <option key={c.code} value={c.code}>{c.name} (+{c.code})</option>)}</select><input type="tel" className="w-full font-black text-3xl tracking-[0.2em] !p-6 border-2 border-blue-200 bg-white shadow-inner rounded-[2rem] outline-none focus:border-blue-600 text-slate-800" placeholder="600 000 000" value={formData.telefonoCliente} onChange={e => setFormData({...formData, telefonoCliente: e.target.value})} /></div></div></div></div>}
                                            
                                            {step === 7 && (
                                                <div className="space-y-8 animate-in text-left">
                                                    <h2 className="text-3xl font-black uppercase border-b-2 border-slate-100 pb-4 text-center italic tracking-widest text-slate-800">7. Liquidación Administrativa</h2>
                                                    <div className="grid grid-cols-3 gap-8 px-6">
                                                        <div><label className="text-xs text-slate-500 mb-2">Operador Asignado</label><select className="w-full font-black !p-5 bg-slate-50 border-2 border-slate-200 rounded-[1.5rem] outline-none focus:border-blue-500 text-slate-700" value={formData.conductor} onChange={e => setFormData({...formData, conductor: e.target.value})}><option>Diego Garcia</option><option>Carlos Ulfar</option></select></div>
                                                        <div><label className="text-xs text-slate-500 mb-2">¿Envío a Taller?</label><select className="w-full font-black !p-5 bg-slate-50 border-2 border-slate-200 rounded-[1.5rem] outline-none focus:border-blue-500 text-slate-700" value={formData.esTaller} onChange={e => setFormData({...formData, esTaller: e.target.value})}><option value="NO">NO (Particular)</option><option value="SI">SI (Taller Oficial)</option></select></div>
                                                        <div><label className="text-xs text-slate-500 mb-2">Canal Origen</label><select className="w-full font-black !p-5 bg-slate-50 border-2 border-slate-200 rounded-[1.5rem] outline-none focus:border-blue-500 text-slate-700" value={formData.canalOrigen} onChange={e => setFormData({...formData, canalOrigen: e.target.value})}><option value="Particular">Particular Directo</option><option value="Seguro">Compañía Seguro</option></select></div>
                                                        <div><label className="text-xs text-slate-500 mb-2">Método de Pago</label><select className="w-full font-black !p-5 border-2 border-blue-200 bg-blue-50 rounded-[1.5rem] outline-none focus:border-blue-600 text-blue-900" value={formData.metodoPago} onChange={e => setFormData({...formData, metodoPago: e.target.value})}><option>Efectivo</option><option>Tarjeta de Crédito</option><option>Bizum</option></select></div>
                                                        <div><label className="text-xs text-slate-500 mb-2">¿Requiere Factura?</label><select className="w-full font-black !p-5 bg-slate-50 border-2 border-slate-200 rounded-[1.5rem] outline-none focus:border-blue-500 text-slate-700" value={formData.requiereFactura} onChange={e => setFormData({...formData, requiereFactura: e.target.value})}><option value="NO">NO</option><option value="SI">SÍ</option></select></div>
                                                        <div><label className="text-blue-600 font-black text-xs mb-2">Precio Final Acordado</label><input type="number" placeholder="Opcional" className="w-full !p-5 font-black text-xl border-2 border-slate-200 rounded-[1.5rem] outline-none focus:border-blue-500" value={formData.precioFinalManual} onChange={e => setFormData({...formData, precioFinalManual: e.target.value})} /></div>
                                                        <div className="col-span-full pt-8 border-t-2 border-slate-100 text-left"><label className="text-emerald-600 font-black italic uppercase text-sm mb-3">Adelantos Registrados (Anticipos)</label><input type="number" placeholder="0.00" className="w-full font-black text-4xl text-emerald-700 border-4 border-emerald-200 shadow-inner !p-6 bg-emerald-50 rounded-[2rem] outline-none focus:border-emerald-500" value={formData.adelantosPagos} onChange={e => setFormData({...formData, adelantosPagos: e.target.value})} /></div>
                                                        <div className="col-span-full mt-4"><label className="flex items-center gap-2 text-sm font-bold text-slate-600 mb-2"><Icon name="MessageSquare" size={18}/> Notas Operativas de Cierre</label><textarea className="w-full h-32 text-base font-bold !p-6 bg-slate-50 border-2 border-slate-200 rounded-[2rem] outline-none focus:border-blue-400 resize-none text-slate-700" value={formData.observaciones} onChange={e => setFormData({...formData, observaciones: e.target.value})} placeholder="Instrucciones para el conductor, peajes, detalles del cliente..."></textarea></div>
                                                    </div>
                                                </div>
                                            )}
                                            {step >= 3 && <ServiceDetailsAudit />}
                                        </div>
                                        <div className="px-12 py-8 bg-slate-50 border-t-2 border-slate-200 flex justify-between items-center mt-auto rounded-b-[3rem]">
                                            <button onClick={prevStep} disabled={step === 1} className={`px-10 py-5 text-xs font-black uppercase rounded-[2rem] transition-all flex items-center gap-3 ${step === 1 ? 'text-slate-300 opacity-0 pointer-events-none' : 'text-slate-500 bg-white border-2 border-slate-200 hover:border-slate-400 hover:shadow-md'}`}><Icon name="ChevronLeft" size={18}/> Volver</button>
                                            <button onClick={step === 7 ? handleFinalize : nextStep} className="px-16 py-6 bg-blue-600 text-white rounded-[2.5rem] font-black text-sm uppercase tracking-[0.2em] hover:bg-blue-700 shadow-2xl shadow-blue-500/30 transition-all flex items-center gap-3 italic transform active:scale-95">{step === 7 ? 'Finalizar y Agendar' : 'Siguiente Paso'} <Icon name="ChevronRight" size={20}/></button>
                                        </div>
                                    </div>
                                </main>
                            </>
                        )}
                        {activeTab === 'dashboard' && <DashboardView />}
                        {activeTab === 'calendar' && <AgendaView />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
