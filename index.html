<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia en Grúa - Dashboard Corporativo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Mapas Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9;
            color: #334155;
            overflow-x: hidden;
            font-size: 14px; /* Tamaño base más profesional */
        }

        .leaflet-container { 
            z-index: 10 !important; 
            border-radius: 1rem; 
            border: 2px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo de Inputs Corporativos */
        input, select, textarea {
            border: 1px solid #cbd5e1 !important;
            border-radius: 0.5rem !important;
            padding: 0.6rem 1rem !important;
            font-size: 0.875rem !important;
            background-color: #fff !important;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6 !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1) !important;
        }

        select { 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); 
            background-position: right 0.75rem center; 
            background-repeat: no-repeat; 
            background-size: 1.2em 1.2em; 
            padding-right: 2.5rem !important; 
            -webkit-appearance: none; 
            appearance: none; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- COMPONENTE DE ICONOS SVG (Optimizado) ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const paths = {
                MapPin: <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></g>,
                Car: <g><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" /><circle cx="7" cy="17" r="2" /><circle cx="17" cy="17" r="2" /></g>,
                Info: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></g>,
                Clock: <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
                User: <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></g>,
                Check: <polyline points="20 6 9 17 4 12" />,
                ChevronRight: <polyline points="9 18 15 12 9 6" />,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                Truck: <g><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16 16 8" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></g>,
                Dollar: <g><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></g>,
                Search: <g><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></g>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" />,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                Alert: <g><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></g>,
                Calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></g>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
                Phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                Message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || null}
                </svg>
            );
        };

        const MOCK_VEHICLES = [
            { id: 1, marca: "Audi", modelo: "A4 Avant", tipo: "Turismo", largo: 4.76, l_l3: 4.50, gama: "Alta", categoria: "Familiar", voladizo: 0.90, peso: 1650, cilindraje: 2000 },
            { id: 2, marca: "Volkswagen", modelo: "Golf 8", tipo: "Turismo", largo: 4.28, l_l3: 4.10, gama: "Media", categoria: "Compacto", voladizo: 0.85, peso: 1350, cilindraje: 1500 },
            { id: 3, marca: "Mercedes-Benz", modelo: "Sprinter L2H2", tipo: "Furgón", largo: 5.93, l_l3: 5.60, gama: "Industrial", categoria: "Ligero", voladizo: 1.10, peso: 2400, cilindraje: 2200 },
            { id: 4, marca: "Renault", modelo: "Zoe", tipo: "Eléctrico", largo: 4.08, l_l3: 3.90, gama: "Media", categoria: "Urbano", voladizo: 0.80, peso: 1502, cilindraje: 0 },
            { id: 5, marca: "BMW", modelo: "X5", tipo: "SUV", largo: 4.92, l_l3: 4.80, gama: "Premium", categoria: "4x4", voladizo: 0.95, peso: 2150, cilindraje: 3000 },
            { id: 6, marca: "Aixam", modelo: "400 Revolution - 3", tipo: "Auto", largo: 3.00, l_l3: 2.29, gama: "Baja", categoria: "Microcoche", voladizo: 0.71, peso: 425, cilindraje: 400 },
        ];

        const COUNTRY_CODES = [
            { name: "España", code: "34" }, { name: "Francia", code: "33" }, { name: "Portugal", code: "351" },
            { name: "Alemania", code: "49" }, { name: "Italia", code: "39" }, { name: "México", code: "52" }
        ];

        const RATES = {
            BASE: [
                { min: 0, max: 10, price: 80, label: "0-10 km" },
                { min: 11, max: 15, price: 85, label: "11-15 km" },
                { min: 16, max: 20, price: 90, label: "16-20 km" },
                { min: 21, max: 25, price: 95, label: "21-25 km" },
                { min: 26, max: 30, price: 100, label: "26-30 km" },
            ],
            PESO: [
                { min: 1901, max: 2050, fijo: 60, km: 0.40 }, { min: 2051, max: 2200, fijo: 80, km: 0.60 },
                { min: 2201, max: 2300, fijo: 95, km: 0.80 }, { min: 2301, max: 2400, fijo: 110, km: 1.00 },
            ],
            DIMENSIONES: [
                { min: 5.00, max: 5.49, fijo: 150, km: 1.50 }, { min: 5.50, max: 6.00, fijo: 200, km: 2.00 },
            ]
        };

        const InteractiveMap = ({ lat, lng, onLocationChange, title }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markerInstance = useRef(null);

            useEffect(() => {
                if (typeof L !== 'undefined' && !mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current).setView([lat, lng], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
                    markerInstance.current = L.marker([lat, lng], { draggable: true }).addTo(mapInstance.current);
                    
                    markerInstance.current.on('dragend', () => {
                        const pos = markerInstance.current.getLatLng();
                        onLocationChange(pos.lat, pos.lng);
                    });

                    mapInstance.current.on('click', (e) => {
                        const { lat, lng } = e.latlng;
                        markerInstance.current.setLatLng([lat, lng]);
                        onLocationChange(lat, lng);
                    });
                }
            }, []);

            useEffect(() => {
                if (markerInstance.current) {
                    markerInstance.current.setLatLng([lat, lng]);
                }
            }, [lat, lng]);

            return (
                <div className="relative w-full h-[320px] overflow-hidden rounded-xl border border-slate-200">
                    <div ref={mapRef} className="w-full h-full"></div>
                    <div className="absolute top-4 left-4 z-[1000] bg-slate-800 text-white px-3 py-1.5 rounded-md text-[10px] font-semibold uppercase tracking-wider">{title}</div>
                </div>
            );
        };

        function App() {
            const [step, setStep] = useState(1);
            const [searchTerm, setSearchTerm] = useState("");
            const [showVehResults, setShowVehResults] = useState(false);
            const [formData, setFormData] = useState({
                recogida: "Barcelona, España",
                recogidaCoords: { lat: 41.3892, lng: 2.1772 },
                entrega: "Hospitalet de Llobregat",
                entregaCoords: { lat: 41.3650, lng: 2.1200 },
                distanciaVacio: 3.13,
                matricula: "", anio: "", marcaModelo: "",
                tipo: "", largo: "", l_l3: "", gama: "", categoria: "", voladizo: "", peso: 0, cilindraje: "",
                tipoIncidente: "0", complejidadOperacional: "0", zonaDificil: "NO", accesoComplicado: "NO",
                prioridad: "0", tipoServicioLabel: "Servicio Programado",
                presenciaCliente: "Cliente presente", nombreCliente: "", fechaServicio: "", fechaFinalServicio: "", telefonoCliente: "", indicativoPais: "34",
                conductor: "No asignado", esTaller: "NO", canalOrigen: "no asignado", metodoPago: "Efectivo", requiereFactura: "NO",
                precioFinalManual: "", adelantosPagos: "0", observaciones: "", nacionalidad: "1"
            });

            const currentDistance = useMemo(() => {
                const R = 6371;
                const dLat = (formData.entregaCoords.lat - formData.recogidaCoords.lat) * Math.PI / 180;
                const dLon = (formData.entregaCoords.lng - formData.recogidaCoords.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(formData.recogidaCoords.lat * Math.PI / 180) * Math.cos(formData.entregaCoords.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                return parseFloat((R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2));
            }, [formData.recogidaCoords, formData.entregaCoords]);

            const calculation = useMemo(() => {
                let base = 80; let tramoLabel = "0-10 km";
                const d = currentDistance;
                if (d > 30) { base = 100 + (Math.ceil((d - 30) / 5) * 5); tramoLabel = `+30 km`; }
                else {
                    const match = RATES.BASE.find(r => d >= r.min && d <= r.max);
                    if (match) { base = match.price; tramoLabel = match.label; }
                }
                const pMatch = RATES.PESO.find(r => formData.peso >= r.min && formData.peso <= r.max);
                const pTotal = pMatch ? (pMatch.fijo + d * pMatch.km) : 0;
                const dMatch = RATES.DIMENSIONES.find(r => formData.l_l3 >= r.min && formData.l_l3 <= r.max);
                const dTotal = dMatch ? (dMatch.fijo + d * dMatch.km) : 0;
                const mayorRecargo = Math.max(pTotal, dTotal);
                const subtotal = base + mayorRecargo + parseFloat(formData.tipoIncidente || 0) + parseFloat(formData.complejidadOperacional || 0) + (formData.zonaDificil === "SI" ? 50 : 0) + (formData.accesoComplicado === "SI" ? 50 : 0) + parseFloat(formData.prioridad || 0);
                const total = subtotal * parseFloat(formData.nacionalidad || 1);
                return { base, tramoLabel, pTotal, dTotal, isPesoMayor: pTotal >= dTotal && pTotal > 0, isDimMayor: dTotal > pTotal && dTotal > 0, total, iva: total * 0.21 };
            }, [formData, currentDistance]);

            const filteredVehicles = useMemo(() => {
                if (!searchTerm) return [];
                return MOCK_VEHICLES.filter(v => v.marca.toLowerCase().includes(searchTerm.toLowerCase()) || v.modelo.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [searchTerm]);

            const selectVehicle = (v) => {
                setFormData({...formData, marcaModelo: `${v.marca} ${v.modelo}`, tipo: v.tipo, largo: v.largo, l_l3: v.l_l3, gama: v.gama, categoria: v.categoria, voladizo: v.voladizo, peso: v.peso, cilindraje: v.cilindraje });
                setSearchTerm(`${v.marca} ${v.modelo}`); setShowVehResults(false);
            };

            const prevStep = () => setStep(s => Math.max(s - 1, 1));
            const nextStep = () => setStep(s => Math.min(s + 1, 7));

            const stepsHeader = [
                { id: 1, label: 'Origen', icon: "MapPin" }, { id: 2, label: 'Destino', icon: "Navigation" }, { id: 3, label: 'Vehículo', icon: "Car" },
                { id: 4, label: 'Técnico', icon: "Info" }, { id: 5, label: 'Servicio', icon: "Clock" }, { id: 6, label: 'Cliente', icon: "User" }, { id: 7, label: 'Resumen', icon: "CheckCircle" },
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
                    {/* SIDEBAR CORPORATIVO */}
                    <aside className="w-full md:w-80 bg-white border-r border-slate-200 p-6 flex flex-col justify-between order-2 md:order-1 shadow-sm">
                        <div className="space-y-6 text-left">
                            <h3 className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">Información del Servicio</h3>
                            <div className="space-y-4">
                                <div className="flex gap-3 items-start"><Icon name="MapPin" size={16} className="text-blue-500 mt-1"/><div><p className="text-[9px] font-bold text-slate-400 uppercase">Origen</p><p className="text-xs font-semibold leading-tight">{formData.recogida}</p></div></div>
                                <div className="flex gap-3 items-start"><Icon name="Navigation" size={16} className="text-emerald-500 mt-1"/><div><p className="text-[9px] font-bold text-slate-400 uppercase">Destino</p><p className="text-xs font-semibold leading-tight">{formData.entrega}</p></div></div>
                                <div className="flex gap-3 items-start"><Icon name="Car" size={16} className="text-amber-500 mt-1"/><div><p className="text-[9px] font-bold text-slate-400 uppercase">Vehículo</p><p className="text-xs font-semibold leading-tight truncate w-44">{formData.marcaModelo || 'Pendiente'}</p></div></div>
                            </div>
                        </div>
                        <div className="pt-6 mt-6 border-t border-slate-100">
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-3 text-left">Presupuesto de Orden</p>
                            <div className="bg-slate-900 text-white p-6 rounded-xl shadow-lg border border-slate-800">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-3xl font-bold">{(calculation.total + calculation.iva).toFixed(2)}€</span>
                                    <Icon name="Dollar" size={20} className="text-slate-500"/>
                                </div>
                                <p className="text-[9px] text-slate-400 uppercase tracking-wider font-medium">Neto + IVA (21%)</p>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN AREA */}
                    <main className="flex-1 p-4 md:p-8 order-1 md:order-2 overflow-y-auto flex flex-col h-screen">
                        <header className="mb-6 flex justify-between items-center px-2">
                            <div className="flex items-center gap-3 text-slate-800 font-bold text-lg">
                                <Icon name="Truck" size={24} className="text-blue-600"/> 
                                <span>CENTRAL DE OPERACIONES</span>
                            </div>
                            <div className="text-[10px] text-slate-400 font-semibold tracking-wider uppercase">Operador: Diego G.</div>
                        </header>

                        {/* STEPPER COMPACTO */}
                        <div className="flex justify-between items-center mb-8 relative px-4 max-w-4xl mx-auto w-full">
                            <div className="absolute top-5 left-10 right-10 h-[1px] bg-slate-200 -z-10"></div>
                            {stepsHeader.map(s => (
                                <div key={s.id} className="flex flex-col items-center">
                                    <div className={`w-10 h-10 rounded-lg flex items-center justify-center border transition-all duration-300 ${step >= s.id ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-300'}`}>
                                        {step > s.id ? <Icon name="Check" size={18}/> : <span className="text-xs font-bold">{s.id}</span>}
                                    </div>
                                    <span className={`text-[9px] mt-2 font-semibold uppercase tracking-tighter ${step >= s.id ? 'text-blue-600' : 'text-slate-400'}`}>{s.label}</span>
                                </div>
                            ))}
                        </div>

                        {/* CONTENT CONTAINER CORPORATIVO */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden animate-in">
                            
                            <div className="p-8 flex-1 overflow-y-auto">
                                {step === 1 && (
                                    <div className="space-y-6">
                                        <div className="text-left border-b border-slate-50 pb-4">
                                            <h2 className="text-xl font-bold text-slate-800 tracking-tight leading-none mb-1 uppercase">Localización de Recogida</h2>
                                            <p className="text-xs text-slate-400">Defina el punto exacto donde se encuentra el vehículo.</p>
                                        </div>
                                        <div className="relative group max-w-2xl text-left">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Dirección Manual</label>
                                            <div className="relative">
                                                <div className="absolute left-3 top-3 text-slate-400"><Icon name="Search" size={16}/></div>
                                                <input type="text" className="w-full pl-10 pr-4 py-2 text-sm font-medium" value={formData.recogida} onChange={e => setFormData({...formData, recogida: e.target.value})} />
                                            </div>
                                        </div>
                                        <InteractiveMap lat={formData.recogidaCoords.lat} lng={formData.recogidaCoords.lng} title="Mapa Origen" onLocationChange={(lat,lng) => setFormData({...formData, recogidaCoords: {lat,lng}})} />
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="space-y-6">
                                        <div className="text-left border-b border-slate-50 pb-4">
                                            <h2 className="text-xl font-bold text-slate-800 tracking-tight leading-none mb-1 uppercase">Destino de Entrega</h2>
                                            <p className="text-xs text-slate-400">Defina el lugar donde será depositado el vehículo.</p>
                                        </div>
                                        <div className="relative group max-w-2xl text-left">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Dirección de Destino</label>
                                            <div className="relative">
                                                <div className="absolute left-3 top-3 text-slate-400"><Icon name="Navigation" size={16}/></div>
                                                <input type="text" className="w-full pl-10 pr-4 py-2 text-sm font-medium" value={formData.entrega} onChange={e => setFormData({...formData, entrega: e.target.value})} />
                                            </div>
                                        </div>
                                        <InteractiveMap lat={formData.entregaCoords.lat} lng={formData.entregaCoords.lng} title="Mapa Destino" onLocationChange={(lat,lng) => setFormData({...formData, entregaCoords: {lat,lng}})} />
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="space-y-6">
                                        <div className="text-left border-b border-slate-50 pb-4">
                                            <h2 className="text-xl font-bold text-slate-800 tracking-tight leading-none mb-1 uppercase">Ficha Técnica del Vehículo</h2>
                                            <p className="text-xs text-slate-400">Configure los parámetros para el cálculo de familia de pesos y dimensiones.</p>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1 leading-none">Matrícula</label><input type="text" placeholder="1234ABC" className="w-full font-bold text-lg" value={formData.matricula} onChange={e => setFormData({...formData, matricula: e.target.value.toUpperCase()})} /></div>
                                            <div className="space-y-1 relative"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1 leading-none">Buscador Base de Datos</label>
                                                <input type="text" placeholder="Marca o Modelo..." className="w-full font-medium" value={searchTerm} onChange={e => {setSearchTerm(e.target.value); setShowVehResults(true);}} onFocus={() => setShowVehResults(true)} />
                                                {showVehResults && filteredVehicles.length > 0 && (
                                                    <div className="absolute top-full left-0 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-xl z-[2000] p-1 max-h-48 overflow-y-auto text-left">
                                                        {filteredVehicles.map(v => <button key={v.id} onClick={() => selectVehicle(v)} className="w-full text-left p-3 hover:bg-blue-50 rounded-md text-xs font-semibold flex gap-3 items-center transition-colors">
                                                            <Icon name="Car" size={14} className="text-slate-400"/> {v.marca} {v.modelo}
                                                        </button>)}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 p-4 bg-slate-50 rounded-xl border border-slate-100 text-left">
                                            {['tipo', 'categoria', 'largo', 'peso', 'l_l3', 'gama', 'voladizo', 'cilindraje'].map(k => (
                                                <div key={k}><label className="text-[8px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-0.5 inline-block">{k}</label><input type="text" className="w-full !p-2 !text-xs font-bold border-slate-200" value={formData[k] || ""} onChange={e => setFormData({...formData, [k]: e.target.value})} /></div>
                                        ))}
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-slate-50 text-left">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Auditoría de Cálculos Automáticos:</p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className={`p-3 rounded-lg border ${calculation.isPesoMayor ? 'bg-blue-50/50 border-blue-100' : 'bg-white border-slate-100 opacity-60'}`}>
                                                    <div className="flex justify-between items-center"><span className="text-[10px] font-bold uppercase tracking-tighter">Familia PESO</span><span className="text-xs font-bold">{calculation.isPesoMayor ? calculation.pTotal.toFixed(2) + '€' : 'N/A'}</span></div>
                                                    <p className="text-[9px] text-slate-400 italic">Cálculo basado en tara técnica.</p>
                                                </div>
                                                <div className={`p-3 rounded-lg border ${calculation.isDimMayor ? 'bg-blue-50/50 border-blue-100' : 'bg-white border-slate-100 opacity-60'}`}>
                                                    <div className="flex justify-between items-center"><span className="text-[10px] font-bold uppercase tracking-tighter">Familia DIMENSIONES</span><span className="text-xs font-bold">{calculation.isDimMayor ? calculation.dTotal.toFixed(2) + '€' : 'N/A'}</span></div>
                                                    <p className="text-[9px] text-slate-400 italic">Cálculo basado en longitud L-L3.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {step === 4 && (
                                    <div className="space-y-6">
                                        <div className="text-left border-b border-slate-50 pb-4">
                                            <h2 className="text-xl font-bold text-slate-800 tracking-tight leading-none mb-1 uppercase">Análisis de Entorno y Avería</h2>
                                            <p className="text-xs text-slate-400">Factores adicionales que afectan la tarifa base.</p>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-blue-600 uppercase ml-1">Naturaleza del Incidente</label><select className="w-full font-semibold" value={formData.tipoIncidente} onChange={e => setFormData({...formData, tipoIncidente: e.target.value})}><option value="0">Motor no arranca (Estándar)</option><option value="50">Embrague dañado (+50€)</option><option value="100">Caja automática bloqueada (+100€)</option><option value="200">Pérdida de llaves (+200€)</option><option value="100">Tren de rodaje bloqueado (+100€)</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-blue-600 uppercase ml-1">Complejidad Operativa</label><select className="w-full font-semibold" value={formData.complejidadOperacional} onChange={e => setFormData({...formData, complejidadOperacional: e.target.value})}><option value="0">Carga directa</option><option value="100">Maniobra especial (+100€)</option><option value="200">Maniobra alta complejidad (+200€)</option><option value="300">Operación de rescate (+300€)</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase ml-1 tracking-tighter">Entorno Restringido (Túnel/Zonas estrechas)</label><select className="w-full" value={formData.zonaDificil} onChange={e => setFormData({...formData, zonaDificil: e.target.value})}><option value="NO">No identificado</option><option value="SI">Identificado (+50€)</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500 uppercase ml-1 tracking-tighter">Acceso Especial (Terreno no asfaltado)</label><select className="w-full" value={formData.accesoComplicado} onChange={e => setFormData({...formData, accesoComplicado: e.target.value})}><option value="NO">No identificado</option><option value="SI">Identificado (+50€)</option></select></div>
                                        </div>
                                    </div>
                                )}

                                {step === 5 && (
                                    <div className="space-y-8 animate-in">
                                        <div className="text-center">
                                            <h2 className="text-xl font-bold text-slate-800 uppercase tracking-tight mb-1">Nivel de Prioridad del Servicio</h2>
                                            <p className="text-xs text-slate-400">Seleccione el modo de respuesta de la unidad de asistencia.</p>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 px-4">
                                            {[ { id: "50", label: "URGENTE", icon: "Alert", color: "text-red-600", bg: "bg-red-50", desc: "Respuesta inmediata" },
                                               { id: "0", label: "PROGRAMADO", icon: "Calendar", color: "text-blue-600", bg: "bg-blue-50", desc: "Ventana horaria estándar" },
                                               { id: "150", label: "EMERGENCIA", icon: "Zap", color: "text-amber-600", bg: "bg-amber-50", desc: "Prioridad máxima crítica" }
                                            ].map((s) => (
                                                <button key={s.id} onClick={() => setFormData({...formData, prioridad: s.id, tipoServicioLabel: `Servicio ${s.label}`})} className={`p-5 rounded-xl border transition-all text-left ${formData.prioridad === s.id ? 'border-blue-500 ring-2 ring-blue-50 shadow-md bg-white' : 'border-slate-100 bg-slate-50 hover:bg-white hover:border-slate-200'}`}>
                                                    <div className={`${s.color} mb-3`}><Icon name={s.icon} size={24}/></div>
                                                    <h3 className="text-sm font-bold text-slate-700">{s.label}</h3>
                                                    <p className="text-[10px] text-slate-400 font-medium">{s.desc}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 6 && (
                                    <div className="space-y-6 text-left">
                                        <div className="text-left border-b border-slate-50 pb-4">
                                            <h2 className="text-xl font-bold text-slate-800 uppercase tracking-tight leading-none mb-1 text-center">Ficha del Cliente</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 px-12">
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Estatus del Cliente</label><select className="w-full text-xs font-semibold" value={formData.presenciaCliente} onChange={e => setFormData({...formData, presenciaCliente: e.target.value})}><option>Cliente presente</option><option>Ausente en recogida/entrega</option><option>Ubicación: Concesionario</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Nombre Completo / Razón Social</label><input type="text" placeholder="Nombre completo" className="w-full" value={formData.nombreCliente} onChange={e => setFormData({...formData, nombreCliente: e.target.value})} /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Agendamiento de Inicio</label><input type="datetime-local" className="w-full text-xs" value={formData.fechaServicio} onChange={e => setFormData({...formData, fechaServicio: e.target.value})} /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Agendamiento de Cierre (Est.)</label><input type="datetime-local" className="w-full text-xs opacity-60" value={formData.fechaFinalServicio} onChange={e => setFormData({...formData, fechaFinalServicio: e.target.value})} /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Indicativo Internacional</label><select className="w-full text-xs" value={formData.indicativoPais} onChange={e => setFormData({...formData, indicativoPais: e.target.value})}>{COUNTRY_CODES.map(c => <option key={c.code} value={c.code}>{c.name} (+{c.code})</option>)}</select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-blue-600 uppercase ml-1">Teléfono de Enlace</label><input type="tel" placeholder="000 000 000" className="w-full font-bold" value={formData.telefonoCliente} onChange={e => setFormData({...formData, telefonoCliente: e.target.value})} /></div>
                                        </div>
                                    </div>
                                )}

                                {step === 7 && (
                                    <div className="space-y-6 text-left animate-in">
                                        <div className="text-left border-b border-slate-50 pb-4 text-center">
                                            <h2 className="text-xl font-bold text-slate-800 uppercase tracking-tight mb-1">Cierre de Orden Administrativa</h2>
                                            <p className="text-xs text-slate-400">Verifique los términos finales y gestione los cobros correspondientes.</p>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 px-6">
                                            <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-400">Conductor</label><select className="w-full text-xs" value={formData.conductor} onChange={e => setFormData({...formData, conductor: e.target.value})}><option>Diego Garcia</option><option>Carlos Ruiz</option><option>Marta López</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-400">Entidad de Destino (Taller)</label><select className="w-full text-xs" value={formData.esTaller} onChange={e => setFormData({...formData, esTaller: e.target.value})}><option value="NO">Entrega estándar</option><option value="SI">Entrega en Taller Oficial</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-400">Canal de Originación</label><select className="w-full text-xs" value={formData.canalOrigen} onChange={e => setFormData({...formData, canalOrigen: e.target.value})}><option value="no asignado">Particular</option><option value="asignado">Corporativo / Seguro</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-400">Método de Liquidación</label><select className="w-full text-xs" value={formData.metodoPago} onChange={e => setFormData({...formData, metodoPago: e.target.value})}><option>Efectivo</option><option>Tarjeta Bancaria</option><option>Transferencia</option><option>Bizum</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-slate-400">Documento Fiscal</label><select className="w-full text-xs" value={formData.requiereFactura} onChange={e => setFormData({...formData, requiereFactura: e.target.value})}><option value="NO">Sin Factura</option><option value="SI">Con Factura Legal</option></select></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold uppercase text-blue-600">Importe Final Negociado</label><input type="number" placeholder={(calculation.total + calculation.iva).toFixed(2)} className="w-full font-bold text-slate-700 bg-blue-50/50 border-blue-100" value={formData.precioFinalManual} onChange={e => setFormData({...formData, precioFinalManual: e.target.value})} /></div>
                                            
                                            <div className="col-span-full space-y-4 pt-6 mt-4 border-t border-slate-50">
                                                <p className="text-slate-500 font-semibold text-xs text-left italic">El costo proyectado del sistema es: <span className="text-slate-900 border-b-2 border-blue-500/20 font-bold">{(calculation.total + calculation.iva).toFixed(2)}€</span></p>
                                                <div className="relative group max-w-sm">
                                                    <label className="absolute -top-2 left-4 px-2 bg-white text-[9px] font-bold text-emerald-600 uppercase tracking-widest z-10 border border-emerald-50 rounded-sm">Adelantos / Pagos Recibidos</label>
                                                    <input type="number" className="w-full !p-3 border border-emerald-100 bg-white rounded-lg font-bold text-xl text-emerald-700 shadow-sm" value={formData.adelantosPagos} onChange={e => setFormData({...formData, adelantosPagos: e.target.value})} />
                                                </div>
                                            </div>

                                            <div className="col-span-full space-y-2 mt-4">
                                                <label className="text-[10px] font-bold uppercase text-slate-400 flex items-center gap-2"><Icon name="Message" size={14}/> Notas de Despacho</label>
                                                <textarea className="w-full !p-4 bg-slate-50 border border-slate-100 rounded-lg h-24 text-xs font-medium focus:bg-white transition-all shadow-inner" value={formData.observaciones} onChange={e => setFormData({...formData, observaciones: e.target.value})} placeholder="Instrucciones adicionales para logística..."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* NAV BAR CORPORATIVA */}
                            <div className="px-8 py-5 bg-slate-50 border-t border-slate-100 flex justify-between items-center mt-auto">
                                <button onClick={prevStep} disabled={step === 1} className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all rounded-md flex items-center gap-2 ${step === 1 ? 'text-slate-300 pointer-events-none' : 'text-slate-500 hover:bg-slate-200 hover:text-slate-800'}`}><Icon name="ChevronLeft" size={16}/> Volver</button>
                                <button onClick={nextStep} className="px-10 py-3 bg-blue-600 text-white rounded-lg font-bold text-[11px] uppercase tracking-[0.2em] shadow-md hover:bg-blue-700 hover:translate-y-[-1px] active:translate-y-[0] transition-all flex items-center gap-3">
                                    {step === 7 ? 'Cerrar Servicio' : 'Siguiente Paso'} <Icon name="ChevronRight" size={18}/>
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
